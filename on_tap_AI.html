<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập thi AI - Tổng hợp các kỳ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#222;padding:20px}
h1{text-align:center;margin:20px 0;font-size:2em;color:#1a1a2e}
.tabs{display:flex;flex-direction:column;gap:14px;width:100%;max-width:420px;margin:0 auto 24px}
.tab{padding:18px 30px;border:none;border-radius:14px;cursor:pointer;font-weight:700;font-size:1.15em;background:#e0e0e0;transition:.2s;text-align:center}
.tab:hover{background:#ccc;transform:scale(1.02)}
.tab.active{background:#1a1a2e;color:#fff}
.mock-btn{background:#fff3e0;color:#e65100;border:2px solid #ff9800}
.mock-btn:hover{background:#ffe0b2;border-color:#f57c00}
.mock-btn.active{background:#e65100 !important;color:#fff !important;border-color:#bf360c}
.sub-tabs{display:none;flex-direction:row;gap:10px;justify-content:center;margin-bottom:24px}
.sub-tabs.show{display:flex}
.sub-tab{padding:12px 24px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:.95em;background:#e8eaf6;transition:.2s}
.sub-tab:hover{background:#c5cae9}
.sub-tab.active{background:#3949ab;color:#fff}
.question{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.question h3{font-size:1.05em;margin-bottom:12px;color:#1a1a2e;border-left:4px solid #4a6cf7;padding-left:12px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:10px;padding:10px 14px;border:2px solid #ddd;border-radius:8px;cursor:pointer;transition:.2s;background:#fafafa}
.option:hover{border-color:#4a6cf7;background:#eef1ff}
.option.correct{border-color:#28a745;background:#d4edda;color:#155724}
.option.wrong{border-color:#dc3545;background:#f8d7da;color:#721c24}
.option.disabled{cursor:default;opacity:.9}
.option input[type="radio"]{accent-color:#4a6cf7;transform:scale(1.2)}
.explanation{display:none;margin-top:12px;padding:14px;background:#f8f9fa;border-radius:8px;border-left:4px solid #4a6cf7;font-size:.95em;line-height:1.5}
.explanation.show{display:block}
.explanation .label{font-weight:700;color:#4a6cf7}
.stats{text-align:center;margin-bottom:20px;font-size:.9em;color:#666}
.answer-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.8em;font-weight:600;margin-left:8px}
.answer-badge.correct-badge{background:#28a745;color:#fff}
.answer-badge.wrong-badge{background:#dc3545;color:#fff}
.ky-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.8em;font-weight:600;margin-bottom:10px}
.ky-20241{background:#e3f2fd;color:#0d47a1}
.ky-20221{background:#fce4ec;color:#880e4f}
.ky-ktlt_on{background:#e8f5e9;color:#1b5e20}
.ky-ktlt_20221{background:#fff3e0;color:#e65100}
.ky-ktlt_vuong{background:#f3e5f5;color:#6a1b9a}
.ky-ktlt_20212{background:#e0f7fa;color:#00695c}
.ky-ktlt_20211{background:#fff8e1;color:#f57f17}
.ky-ktlt_on32{background:#fbe9e7;color:#bf360c}
.ky-ktlt_on31{background:#f1f8e9;color:#33691e}
.ky-ktlt_essay{background:#fff3e0;color:#e65100}
.show-answer-btn{display:inline-block;margin-top:12px;padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.9em;background:#ff9800;color:#fff;transition:.2s}
.show-answer-btn:hover{background:#f57c00;transform:scale(1.03)}
.essay-answer{display:none;margin-top:12px;padding:16px;background:#fff8e1;border-radius:8px;border-left:4px solid #ff9800;font-size:.95em;line-height:1.6}
.essay-answer.show{display:block}
.essay-answer .answer-content{color:#333}
.essay-answer pre{background:#f5f5f5;padding:10px;border-radius:6px;overflow-x:auto;font-size:.9em}
.mode-toggle{display:none;justify-content:center;align-items:center;gap:12px;margin-bottom:20px;font-weight:600}
.mode-toggle.show{display:flex}
.mode-btn{padding:8px 20px;border:2px solid #ccc;border-radius:20px;cursor:pointer;background:#fff;transition:.2s;font-size:.9em;font-weight:600;color:#555}
.mode-btn:hover{border-color:#4a6cf7}
.mode-btn.active{background:#4a6cf7;color:#fff;border-color:#4a6cf7}
.submit-btn{display:none;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:999;padding:14px 40px;border:none;border-radius:12px;cursor:pointer;font-weight:700;font-size:1.1em;background:#28a745;color:#fff;transition:.2s;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.submit-btn:hover{background:#218838}
.submit-btn.show{display:block}
body{padding-bottom:100px}
.result-bar{display:none;text-align:center;padding:16px;border-radius:12px;margin-bottom:20px;font-size:1.1em;font-weight:600}
.result-bar.show{display:block}
.result-bar.pass{background:#d4edda;color:#155724}
.result-bar.fail{background:#f8d7da;color:#721c24}
.option.exam-selected{border-color:#4a6cf7;background:#eef1ff;font-weight:600}
.question pre{background:#f5f5f5;padding:12px;border-radius:6px;overflow-x:auto;font-size:.9em;border:1px solid #ddd;margin:8px 0;line-height:1.5}
.question code{font-family:'Consolas','Courier New',monospace}
</style>
</head>
<body>

<h1>📚 Ôn tập thi - Tổng hợp các kỳ</h1>
<div class="stats" id="stats">Chọn kỳ thi để bắt đầu</div>

<div class="tabs" id="tabs">
  <button class="tab" data-tab="ai">🤖 Đề thi cuối kỳ AI</button>
  <button class="tab" data-tab="ktlt">💻 Đề thi cuối kỳ KTLT</button>
  <button class="tab mock-btn" data-tab="mock_ai">🧪 Thi thử AI (40 câu)</button>
  <button class="tab mock-btn" data-tab="mock_ktlt">🧪 Thi thử KTLT (40 câu)</button>
</div>
<div class="sub-tabs" id="subTabs">
  <button class="sub-tab" data-sub="ky20241">📄 Kỳ 20241 (AI)</button>
  <button class="sub-tab" data-sub="ky20221">📄 Kỳ 20221 (AI)</button>
  <button class="sub-tab" data-sub="ktlt_on" style="display:none">📄 Ôn tập KTLT</button>
  <button class="sub-tab" data-sub="ktlt_20221" style="display:none">📄 Kỳ 20221 KTLT</button>
  <button class="sub-tab" data-sub="ktlt_vuong" style="display:none">📄 Thầy Vượng</button>
  <button class="sub-tab" data-sub="ktlt_20212" style="display:none">📄 Cuối kì 20212</button>
  <button class="sub-tab" data-sub="ktlt_20211" style="display:none">📄 Cuối kì 20211</button>
  <button class="sub-tab" data-sub="ktlt_on32" style="display:none">📄 Tổng ôn 20232</button>
  <button class="sub-tab" data-sub="ktlt_on31" style="display:none">📄 Tổng ôn 20231</button>
  <button class="sub-tab" data-sub="ktlt_essay" style="display:none">📝 Đề tự luận</button>
</div>
<div class="mode-toggle" id="modeToggle">
  <span>📖</span>
  <button class="mode-btn active" data-mode="practice">Ôn tập</button>
  <button class="mode-btn" data-mode="exam">📝 Làm đề</button>
</div>
<div id="resultBar" class="result-bar"></div>
<button class="submit-btn" id="submitBtn">📤 Nộp bài</button>
<div id="questions-container"></div>

<script src="AI/ai_questions.js"></script>
<script src="ktlt/ktlt_questions.js"></script>
<script src="ktlt/ktltExtraQuestions.js"></script>
<script src="ktlt/ktltEssay.js"></script>
<script>
const questions = [...aiQuestions];
// Merge KTLT questions
questions.push(...ktltQuestions, ...ktltQuestions2, ...ktltQuestions3);
questions.push(...ktltExtraQuestions);

let selected = {};
let wrongAttempt = {};
let examAnswers = {};
let examSubmitted = false;
let examMode = false;
let shuffleCache = {};

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleQuestions(qs) {
  const shuffled = shuffleArray(qs);
  return shuffled.map(q => {
    const indices = [...Array(q.options.length).keys()];
    const shuffledIndices = shuffleArray(indices);
    return {
      ...q,
      shuffledOptions: shuffledIndices.map(i => q.options[i]),
      shuffledAnswer: shuffledIndices.indexOf(q.answer)
    };
  });
}

function shuffleQuestionsOnly(qs) {
  const shuffled = shuffleArray(qs);
  return shuffled.map(q => ({
    ...q,
    shuffledOptions: q.options,
    shuffledAnswer: q.answer
  }));
}

function noShuffle(qs) {
  return qs.map(q => ({
    ...q,
    shuffledOptions: q.options,
    shuffledAnswer: q.answer
  }));
}

function cleanExplanation(exp) {
  const idx = exp.indexOf('<br><b>Đáp án:');
  return idx !== -1 ? exp.substring(0, idx) : exp;
}

function renderQuestions(ky) {
  const container = document.getElementById('questions-container');
  const modeToggle = document.getElementById('modeToggle');
  const submitBtn = document.getElementById('submitBtn');
  const resultBar = document.getElementById('resultBar');

  resultBar.classList.remove('show');
  resultBar.className = 'result-bar';
  submitBtn.classList.remove('show');
  examSubmitted = false;

  if (ky === 'ktlt') {
    container.innerHTML = '';
    const subTabs = document.getElementById('subTabs');
    subTabs.classList.add('show');
    document.querySelectorAll('.sub-tab').forEach(s => {
      if (['ktlt_on','ktlt_20221','ktlt_vuong','ktlt_20212','ktlt_20211','ktlt_on32','ktlt_on31','ktlt_essay'].includes(s.dataset.sub)) {
        s.style.display = '';
      } else {
        s.style.display = 'none';
      }
    });
    modeToggle.classList.remove('show');
    return;
  }

  if (ky === 'ktlt_essay') {
    document.getElementById('modeToggle').classList.remove('show');
    document.getElementById('submitBtn').classList.remove('show');
    const rb = document.getElementById('resultBar');
    rb.classList.remove('show');
    rb.className = 'result-bar';
    renderEssay();
    return;
  }

  if (!ky) {
    container.innerHTML = '';
    document.getElementById('stats').textContent = 'Chọn đề thi để bắt đầu';
    modeToggle.classList.remove('show');
    return;
  }

  if (ky === 'mock_ai' || ky === 'mock_ktlt') {
    const display = shuffleCache[ky];
    if (!display || display.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:#888;font-size:1.1em">Không có câu hỏi.</p>';
      document.getElementById('stats').textContent = '0 câu hỏi';
      return;
    }
    modeToggle.classList.remove('show');
    submitBtn.classList.add('show');
    renderExam(display);
    return;
  }

  const filtered = questions.filter(q => q.ky === ky);
  
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#888;font-size:1.1em">Chưa có câu hỏi cho kỳ này.</p>';
    document.getElementById('stats').textContent = '0 câu hỏi';
    modeToggle.classList.remove('show');
    return;
  }

  if (!shuffleCache[ky]) {
    shuffleCache[ky] = examMode ? shuffleQuestionsOnly(filtered) : noShuffle(filtered);
  }
  const display = shuffleCache[ky];

  modeToggle.classList.add('show');

  if (!examMode) {
    submitBtn.classList.remove('show');
    renderPractice(display);
  } else {
    submitBtn.classList.add('show');
    renderExam(display);
  }
}

function renderPractice(display) {
  const container = document.getElementById('questions-container');
  let html = '';
  display.forEach((q, idx) => {
    const sel = selected[q.id] ?? -1;
    const wrong = wrongAttempt[q.id] ?? -1;
    const correct = sel === q.shuffledAnswer;
    html += `<div class="question" data-id="${q.id}">
      <span class="ky-badge ky-${q.ky}">${q.label}</span>
      <h3>Câu ${idx + 1}: ${q.text}</h3>
      <div class="options">`;
    
    q.shuffledOptions.forEach((opt, idx) => {
      let cls = 'option';
      if (wrong === idx) cls += ' wrong';
      if (correct && idx === q.shuffledAnswer) cls += ' correct disabled';
      const checked = (wrong === idx || (correct && sel === idx)) ? 'checked' : '';
      const disabled = correct ? 'disabled' : '';
      html += `<label class="${cls}">
        <input type="radio" name="q${q.id}" value="${idx}" ${checked} ${disabled} onchange="selectOption(${q.id}, ${idx})">
        <span>${String.fromCharCode(65+idx)}. ${opt}</span>
      </label>`;
    });

    html += `</div>
      <div class="explanation ${correct ? 'show' : ''}" id="exp${q.id}">
        <div class="label">${correct ? '<span class="answer-badge correct-badge">✓ Đúng</span>' : ''} Giải thích:</div>
        ${cleanExplanation(q.explanation)}
      </div>
    </div>`;
  });
  
  container.innerHTML = html;
  const count = display.length;
  const answeredCount = display.filter(q => selected[q.id] === q.shuffledAnswer).length;
  document.getElementById('stats').textContent = count + ' câu hỏi • Đã đúng: ' + answeredCount + '/' + count;
}

function renderExam(display) {
  const container = document.getElementById('questions-container');
  let html = '';
  display.forEach((q, idx) => {
    const ans = examAnswers[q.id] ?? -1;
    html += `<div class="question" data-id="${q.id}">
      <span class="ky-badge ky-${q.ky}">${q.label}</span>
      <h3>Câu ${idx + 1}: ${q.text}</h3>
      <div class="options">`;
    
    q.shuffledOptions.forEach((opt, idx) => {
      let cls = 'option';
      if (ans === idx) cls += ' exam-selected';
      const checked = (ans === idx) ? 'checked' : '';
      html += `<label class="${cls}">
        <input type="radio" name="q${q.id}" value="${idx}" ${checked} onchange="examSelect(${q.id}, ${idx})">
        <span>${String.fromCharCode(65+idx)}. ${opt}</span>
      </label>`;
    });

    html += `</div>
      <div class="explanation" id="exp${q.id}">
        <div class="label">Giải thích:</div>
        ${cleanExplanation(q.explanation)}
      </div>
    </div>`;
  });
  
  container.innerHTML = html;
  const count = display.length;
  const answered = Object.keys(examAnswers).length;
  document.getElementById('stats').textContent = count + ' câu hỏi • Đã chọn: ' + answered + '/' + count;
}

function selectOption(qid, idx) {
  if (selected[qid] !== undefined) return;
  const activeSub = document.querySelector('.sub-tab.active');
  if (!activeSub) return;
  const ky = activeSub.dataset.sub;
  const display = shuffleCache[ky];
  if (!display) return;
  const q = display.find(q => q.id === qid);
  if (!q) return;
  if (idx === q.shuffledAnswer) {
    selected[qid] = idx;
    delete wrongAttempt[qid];
  } else {
    wrongAttempt[qid] = idx;
  }
  if (activeSub) renderQuestions(ky);
  const el = document.querySelector(`.question[data-id="${qid}"]`);
  if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function examSelect(qid, idx) {
  if (examSubmitted) return;
  examAnswers[qid] = idx;
  const activeSub = document.querySelector('.sub-tab.active');
  if (activeSub) {
    renderQuestions(activeSub.dataset.sub);
  } else {
    const activeMock = document.querySelector('.tab.mock-btn.active');
    if (activeMock) renderQuestions(activeMock.dataset.tab);
  }
}

function submitExam() {
  if (examSubmitted) return;
  examSubmitted = true;

  let activeSub = document.querySelector('.sub-tab.active');
  let ky;
  if (activeSub) {
    ky = activeSub.dataset.sub;
  } else {
    const activeMock = document.querySelector('.tab.mock-btn.active');
    if (!activeMock) return;
    ky = activeMock.dataset.tab;
  }
  const display = shuffleCache[ky];
  if (!display) return;
  const container = document.getElementById('questions-container');
  const submitBtn = document.getElementById('submitBtn');
  const resultBar = document.getElementById('resultBar');

  let correctCount = 0;
  let html = '';
  display.forEach((q, idx) => {
    const ans = examAnswers[q.id] ?? -1;
    const correct = ans === q.shuffledAnswer;
    if (correct) correctCount++;
    html += `<div class="question" data-id="${q.id}">
      <span class="ky-badge ky-${q.ky}">${q.label}</span>
      <h3>Câu ${idx + 1}: ${q.text}</h3>
      <div class="options">`;
    
    q.shuffledOptions.forEach((opt, idx) => {
      let cls = 'option';
      if (ans === idx && !correct) cls += ' wrong';
      if (idx === q.shuffledAnswer) cls += ' correct disabled';
      if (ans === idx && correct) cls += ' correct disabled';
      const checked = (ans === idx) ? 'checked' : '';
      const disabled = true;
      html += `<label class="${cls}">
        <input type="radio" name="q${q.id}" value="${idx}" ${checked} ${disabled ? 'disabled' : ''}>
        <span>${String.fromCharCode(65+idx)}. ${opt}</span>
      </label>`;
    });

    const status = correct
      ? '<span class="answer-badge correct-badge">✓ Đúng</span>'
      : '<span class="answer-badge wrong-badge">✗ Sai</span>';
    html += `</div>
      <div class="explanation show" id="exp${q.id}">
        <div class="label">${status} Giải thích:</div>
        ${cleanExplanation(q.explanation)}
      </div>
    </div>`;
  });

  container.innerHTML = html;
  submitBtn.classList.remove('show');

  const total = display.length;
  const pct = Math.round(correctCount / total * 100);
  const pass = pct >= 50;
  resultBar.className = 'result-bar show ' + (pass ? 'pass' : 'fail');
  resultBar.innerHTML = `🎯 Kết quả: ${correctCount}/${total} đúng (${pct}%) — ${pass ? '✅ Đạt' : '❌ Không đạt'}`;
  document.getElementById('stats').textContent = total + ' câu hỏi • Đúng: ' + correctCount + '/' + total + ' (' + pct + '%)';
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    if (this.dataset.tab.startsWith('mock_')) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    resetAnswers();
    const subTabs = document.getElementById('subTabs');
    document.querySelectorAll('.sub-tab').forEach(s => s.classList.remove('active'));
    subTabs.classList.add('show');
    if (this.dataset.tab === 'ai') {
      document.querySelectorAll('.sub-tab').forEach(s => {
        s.style.display = ['ktlt_on','ktlt_20221','ktlt_vuong','ktlt_20212','ktlt_20211','ktlt_on32','ktlt_on31','ktlt_essay'].includes(s.dataset.sub) ? 'none' : '';
      });
      renderQuestions(null);
    } else {
      document.querySelectorAll('.sub-tab').forEach(s => {
        s.style.display = ['ktlt_on','ktlt_20221','ktlt_vuong','ktlt_20212','ktlt_20211','ktlt_on32','ktlt_on31','ktlt_essay'].includes(s.dataset.sub) ? '' : 'none';
      });
      const modeToggle = document.getElementById('modeToggle');
      modeToggle.classList.remove('show');
      renderQuestions('ktlt');
    }
  });
});

document.querySelectorAll('.sub-tab').forEach(sub => {
  sub.addEventListener('click', function() {
    document.querySelectorAll('.sub-tab').forEach(s => s.classList.remove('active'));
    this.classList.add('active');
    resetAnswers();
    renderQuestions(this.dataset.sub);
  });
});

document.querySelectorAll('.mock-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    selected = {};
    wrongAttempt = {};
    examAnswers = {};
    examSubmitted = false;
    document.getElementById('subTabs').classList.remove('show');
    document.getElementById('modeToggle').classList.remove('show');
    document.getElementById('submitBtn').classList.remove('show');
    document.getElementById('resultBar').className = 'result-bar';

    const isAI = this.dataset.tab === 'mock_ai';
    const kyPrefixes = isAI
      ? ['ky20241', 'ky20221']
      : ['ktlt_on', 'ktlt_20221', 'ktlt_vuong', 'ktlt_20212', 'ktlt_20211', 'ktlt_on32', 'ktlt_on31'];
    const pool = questions.filter(q => kyPrefixes.includes(q.ky));
    const shuffledPool = shuffleArray(pool);
    const picked = shuffledPool.slice(0, 40);

    shuffleCache[this.dataset.tab] = shuffleQuestionsOnly(picked);
    renderQuestions(this.dataset.tab);
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    examMode = this.dataset.mode === 'exam';
    resetAnswers();
    const activeSub = document.querySelector('.sub-tab.active');
    if (activeSub) renderQuestions(activeSub.dataset.sub);
  });
});

document.getElementById('submitBtn').addEventListener('click', submitExam);

function resetAnswers() {
  selected = {};
  wrongAttempt = {};
  examAnswers = {};
  examSubmitted = false;
  shuffleCache = {};
}

renderQuestions(null);
</script>
</body>
</html>
